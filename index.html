<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Мое Кино</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-top">
            <h1>🍿 Что смотрим?</h1>
            <button class="icon-btn" onclick="openModal('genre-modal')">⚙️</button>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="🔍 Найти в списке..." oninput="handleSearch()">
        </div>
    </header>

    <div class="categories" id="categories-container"></div>

    <div id="movie-grid" class="movie-grid"></div>

    <!-- Кнопка добавления теперь вызывает специальную функцию -->
    <button class="fab" onclick="openAddModal()">+</button>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

    <!-- ОКНО 1: Окно Добавления / Редактирования -->
    <div class="modal" id="add-movie-modal">
        <div class="modal-header">
            <h2 id="modal-main-title">Добавить в список</h2>
            <button class="close-btn" onclick="closeAllModals()">✕</button>
        </div>
        
        <div class="modal-scroll-area">
            <select id="item-type">
                <option value="Фильм">🎬 Фильм</option>
                <option value="Сериал">📺 Сериал</option>
            </select>

            <input type="text" id="movie-name" placeholder="Название (на англ. для постера)...">
            <select id="movie-genre-select"></select>
            
            <input type="text" id="movie-link" placeholder="🔗 Ссылка на YouTube (необязательно)">
            <textarea id="movie-note" placeholder="📝 Заметка (откуда узнал, что зацепило...)" rows="2"></textarea>
        </div>
        
        <button id="save-btn" class="primary-btn" onclick="saveMovie()">Найти постер и сохранить</button>
    </div>

    <!-- ОКНО 2: Управление жанрами -->
    <div class="modal" id="genre-modal">
        <div class="modal-header">
            <h2>Мои жанры</h2>
            <button class="close-btn" onclick="closeAllModals()">✕</button>
        </div>
        <div class="add-genre-box">
            <input type="text" id="new-genre-name" placeholder="Новый жанр...">
            <button class="primary-btn" onclick="addGenre()">Добавить</button>
        </div>
        <div id="genre-list" class="genre-list"></div>
    </div>

    <!-- ОКНО 3: YouTube Видеоплеер -->
    <div class="video-modal" id="video-modal">
        <button class="video-close-btn" onclick="closeVideoModal()">Закрыть ✕</button>
        <div class="iframe-container">
            <iframe id="youtube-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
